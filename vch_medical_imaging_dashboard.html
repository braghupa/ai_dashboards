
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --b:#0078AE;--bd:#006271;--bl:#D4EFFC;--bt:#009793;--bg:#C1D82F;
  --bo:#F26522;--bp:#843275;--grey:#53585F;--gl:#F2F4F5;--gm:#DDE2E6;
}
body{font-family:'Calibri','Segoe UI',sans-serif;color:#2B2D2F;font-size:13px}
.hdr{background:var(--b);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-radius:8px 8px 0 0}
.hdr-left{display:flex;align-items:center;gap:10px}
.mtn{width:30px;height:26px}
.org{font-size:14px;font-weight:700}
.sub{font-size:10px;opacity:.8}
.hdr-right{display:flex;align-items:center;gap:8px}
.role-sel{font-size:12px;padding:4px 8px;border-radius:4px;border:none;background:rgba(255,255,255,.2);color:#fff;cursor:pointer}
.role-sel option{background:var(--bd);color:#fff}
.role-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;background:rgba(255,255,255,.25);color:#fff}
.subbar{background:var(--bd);padding:6px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.subbar select,.subbar button{font-size:11px;padding:4px 8px;border-radius:4px;border:none;background:rgba(255,255,255,.15);color:#fff;cursor:pointer}
.subbar label{font-size:11px;color:rgba(255,255,255,.7)}
.toggle-grp{display:flex;border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.3)}
.toggle-grp button{border:none;padding:4px 10px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.12);color:#fff;font-family:inherit}
.toggle-grp button.on{background:#fff;color:var(--bd);font-weight:700}
.wrap{padding:10px 10px 14px}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:10px}
.mc{background:var(--gl);border-radius:6px;padding:10px 12px;border-top:3px solid var(--b)}
.mc.teal{border-top-color:var(--bt)}
.mc.green{border-top-color:#2E7D32}
.mc.orange{border-top-color:var(--bo)}
.mc.red{border-top-color:#C62828}
.mc.purple{border-top-color:var(--bp)}
.ml{font-size:10px;color:var(--grey);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mv{font-size:20px;font-weight:700;color:#2B2D2F}
.md{font-size:10px;margin-top:2px}
.up{color:#2E7D32}.dn{color:#C62828}.warn{color:var(--bo)}
.navrow{display:flex;gap:0;border-bottom:2px solid var(--b);margin-bottom:10px;flex-wrap:wrap}
.ntab{font-size:12px;padding:6px 12px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--grey);cursor:pointer;font-family:inherit;margin-bottom:-2px}
.ntab:hover{color:var(--b)}
.ntab.on{color:var(--b);border-bottom-color:var(--b);font-weight:700}
.card{background:#fff;border:1px solid var(--gm);border-radius:6px;padding:10px 14px;margin-bottom:10px}
.ch{font-size:12px;font-weight:700;color:var(--bd);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:480px){.two,.three{grid-template-columns:1fr}}
.lgd{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--grey)}
.lsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:5px 6px;background:var(--gl);color:var(--grey);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--gm)}
.tbl td{padding:5px 6px;border-bottom:0.5px solid var(--gm);color:#2B2D2F}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--gl)}
.pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.p-g{background:#E8F5E9;color:#1B5E20}
.p-y{background:#FFF8E1;color:#E65100}
.p-r{background:#FFEBEE;color:#B71C1C}
.p-b{background:var(--bl);color:var(--bd)}
.p-grey{background:#ECEFF1;color:#37474F}
.alert-row{display:flex;flex-direction:column;gap:6px}
.al{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-radius:5px;border-left:3px solid transparent}
.al.crit{border-left-color:#C62828;background:#FFF5F5}
.al.warn{border-left-color:var(--bo);background:#FFF8F0}
.al.info{border-left-color:var(--b);background:var(--bl)}
.al-t{font-size:12px;font-weight:700;color:#2B2D2F}
.al-d{font-size:11px;color:var(--grey);margin-top:1px;line-height:1.4}
.prog-row{display:flex;flex-direction:column;gap:5px}
.prog-item{display:flex;align-items:center;gap:6px;font-size:11px}
.prog-label{width:60px;color:var(--grey);flex-shrink:0;text-align:right}
.prog-bar{flex:1;height:8px;background:var(--gm);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.prog-val{width:32px;text-align:right;font-weight:700;color:#2B2D2F;font-size:11px}
.section-lock{display:flex;align-items:center;justify-content:center;padding:24px;color:var(--grey);font-size:12px;gap:6px;background:var(--gl);border-radius:6px;border:1px dashed var(--gm)}
.chat-msgs{min-height:80px;max-height:140px;overflow-y:auto;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
.msg{font-size:12px;padding:7px 10px;border-radius:6px;max-width:92%;line-height:1.45}
.msg.ai{background:var(--bl);color:var(--bd);align-self:flex-start;border-radius:2px 6px 6px 6px}
.msg.user{background:var(--b);color:#fff;align-self:flex-end;border-radius:6px 2px 6px 6px}
.ci-row{display:flex;gap:6px}
.ci-row input{flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--gm);border-radius:4px;font-family:inherit}
.sbtn{background:var(--b);color:#fff;border:none;padding:6px 12px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700}
.sbtn:hover{background:var(--bd)}
.foot{text-align:center;font-size:10px;color:var(--grey);padding:6px 0 0;border-top:1px solid var(--gm);margin-top:4px}
</style>

const ROLE_TABS={
  exec:['Overview','Demand vs Capacity','Alerts','AI Insights'],
  site:['Overview','Site Detail','Equipment','Labour FTEs','Waitlist','AI Insights'],
  mod:['Overview','Modality View','Equipment','Waitlist','AI Insights'],
  fin:['Overview','Demand vs Capacity','Labour FTEs','Forecast','AI Insights'],
  clin:['Overview','Waitlist','Demand vs Capacity','AI Insights']
};
const ROLE_LABELS={exec:'Executive',site:'Site Manager',mod:'Modality Lead',fin:'Finance / Planning',clin:'Radiologist'};

let curRole='exec', curTab='Overview', curMetric='patients', charts={};

function getHA(){return document.getElementById('fHA').value}
function getSite(){return document.getElementById('fSite').value}
function getMod(){return document.getElementById('fMod').value}
function getPeriod(){return document.getElementById('fPeriod').value}

function allSites(){
  const ha=getHA();
  if(ha==='VCH') return SITES.VCH;
  if(ha==='PHC') return SITES.PHC;
  return [...SITES.VCH,...SITES.PHC];
}
function filteredSites(){
  const s=getSite(); return s==='all'?allSites():[s];
}
function sum(sites,key,sub){
  return sites.reduce((a,s)=>{
    const d=SITE_DATA[s];
    if(!d) return a;
    if(sub) return a+(d[key]?.[sub]||0);
    return a+(d[key]||0);
  },0);
}

function setMetric(m){
  curMetric=m;
  document.getElementById('tPt').className=m==='patients'?'on':'';
  document.getElementById('tEx').className=m==='exams'?'on':'';
  render();
}

function setRole(){
  curRole=document.getElementById('roleSelect').value;
  curTab='Overview';
  render();
}

function filterUpdate(){
  const ha=getHA(), siteEl=document.getElementById('fSite');
  const prev=siteEl.value;
  siteEl.innerHTML='<option value="all">All sites</option>';
  const lst=ha==='all'?[...SITES.VCH,...SITES.PHC]:SITES[ha]||[];
  lst.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;siteEl.appendChild(o);});
  if(lst.includes(prev)) siteEl.value=prev;
  render();
}

function setTab(t){curTab=t;render();}

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

function statusPill(s){
  const m={Good:'p-g',Fair:'p-y',Aging:'p-y',Critical:'p-r','N/A':'p-grey'};
  return `<span class="pill ${m[s]||'p-grey'}">${s}</span>`;
}
function utilColor(u){return u>=90?'#C62828':u>=80?'#E65100':'#1B5E20';}
function utilBg(u){return u>=90?'#C62828':u>=80?'#F26522':'#2E7D32';}

function getTopMetrics(){
  const sites=filteredSites(), p=getPeriod();
  const tot=sum(sites,curMetric,p);
  const prev=sum(sites,curMetric,p==='ytd'?'2023':p==='2024'?'2023':'2022');
  const yoy=prev?Math.round((tot-prev)/prev*100):0;
  const totalFTE=sites.reduce((a,s)=>{const d=SITE_DATA[s];return d?a+d.fte.rad+d.fte.tech+d.fte.admin:a},0);
  const totalPop=sites.reduce((a,s)=>a+(SITE_DATA[s]?.pop||0),0);
  const totalWait=sites.reduce((a,s)=>{
    const d=SITE_DATA[s];if(!d)return a;
    return a+Object.values(d.waitlist).reduce((x,v)=>x+v,0);
  },0);
  const critEq=sites.reduce((a,s)=>{
    const d=SITE_DATA[s];if(!d)return a;
    return a+Object.values(d.equipment).filter(e=>e.status==='Critical').length;
  },0);
  return [
    {label:`${curMetric==='patients'?'Total patients':'Total exams'} (${p})`,val:tot.toLocaleString(),delta:`${yoy>=0?'+':''}${yoy}% YoY`,cls:yoy>=0?'up':'dn',top:''},
    {label:'Active FTEs',val:totalFTE.toLocaleString(),delta:'Rad + Tech + Admin',cls:'',top:'teal'},
    {label:'Catchment pop.',val:(totalPop/1000).toFixed(0)+'K',delta:'+ visitor demand',cls:'',top:'green'},
    {label:'Waitlist (all mod.)',val:totalWait.toLocaleString(),delta:'Days median wait',cls:'warn',top:'orange'},
    {label:'Critical equipment',val:critEq.toString(),delta:critEq>0?'Immediate attention':'All systems OK',cls:critEq>0?'dn':'up',top:critEq>0?'red':'green'},
  ];
}

function renderNav(){
  const tabs=ROLE_TABS[curRole]||['Overview'];
  const nr=document.getElementById('navRow');
  nr.innerHTML=tabs.map(t=>`<button class="ntab${t===curTab?' on':''}" onclick="setTab('${t}')">${t}</button>`).join('');
}

function renderMetrics(){
  const m=getTopMetrics();
  document.getElementById('metricGrid').innerHTML=m.map(x=>
    `<div class="mc ${x.top}"><div class="ml">${x.label}</div><div class="mv">${x.val}</div>${x.delta?`<div class="md ${x.cls}">${x.delta}</div>`:''}</div>`

}

function renderTab(){
  destroyCharts();
  const el=document.getElementById('tabContent');
  const role=curRole, tab=curTab;

  if(tab==='Overview') renderOverview(el);
  else if(tab==='Demand vs Capacity') renderDemandCap(el);
  else if(tab==='Alerts') renderAlerts(el);
  else if(tab==='Site Detail') renderSiteDetail(el);
  else if(tab==='Equipment') renderEquipment(el);
  else if(tab==='Labour FTEs') renderFTE(el);
  else if(tab==='Waitlist') renderWaitlist(el);
  else if(tab==='Modality View') renderModality(el);
  else if(tab==='Forecast') renderForecast(el);
  else if(tab==='AI Insights') renderChat(el);
}

function renderAlerts(el){
  const sites=filteredSites();
  const alerts=[];
  sites.forEach(s=>{
    const d=SITE_DATA[s];if(!d)return;
    MODS.forEach(m=>{
      const eq=d.equipment[m];if(!eq||eq.status==='N/A')return;
      if(eq.status==='Critical') alerts.push({lvl:'crit',title:`${s} · ${m} equipment critical`,desc:`Age ${eq.age.toFixed(1)} yrs · Utilisation ${eq.util}% · Immediate replacement or servicing required`});
      else if(eq.status==='Aging'&&eq.util>85) alerts.push({lvl:'warn',title:`${s} · ${m} aging + high utilisation`,desc:`Age ${eq.age.toFixed(1)} yrs · ${eq.util}% utilisation — plan capital replacement within 12 months`});
    });
    if(d.waitlist['MRI']>80) alerts.push({lvl:'warn',title:`${s} · MRI waitlist ${d.waitlist['MRI']} days`,desc:`Exceeds 80-day benchmark. Consider add-on shifts or cross-site referral to ${SITES.VCH.includes(s)?'VGH':'SPH'}`});
    const util=d.fte.tech/(d.fte.rad+d.fte.tech+d.fte.admin)*100;
    if(util>75) alerts.push({lvl:'info',title:`${s} · Tech staffing at ${Math.round(util)}% of total FTE`,desc:`Technologist ratio is high. Review workload distribution and recruitment pipeline`});
  });
  if(!alerts.length) alerts.push({lvl:'info',title:'No critical alerts for selected scope',desc:'All equipment, waitlist, and staffing metrics within acceptable thresholds'});
  el.innerHTML=`<div class="card"><div class="ch"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Active alerts & flags</div>
    <div class="alert-row">${alerts.slice(0,10).map(a=>`<div class="al ${a.lvl}"><div><div class="al-t">${a.title}</div><div class="al-d">${a.desc}</div></div></div>`).join('')}</div></div>`;
}

function renderForecast(el){
  const sites=filteredSites();
  const base2024=sum(sites,curMetric,'2024');
  const fVals=[...Array(12)].map((_,i)=>{
    const growth=[1.08,1.09,1.10,1.12,1.12,1.13,1.14,1.15,1.16,1.17,1.18,1.20][i];
    const seasonal=[1.0,0.92,1.05,0.98,1.02,0.88,0.84,1.12,1.0,1.06,1.1,1.18][i];
    return Math.round((base2024/12)*growth*seasonal);
  });
  const labels=['Jan 25','Feb 25','Mar 25','Apr 25','May 25','Jun 25','Jul 25','Aug 25','Sep 25','Oct 25','Nov 25','Dec 25'];
  const ci=fVals.map(v=>Math.round(v*0.07));
  el.innerHTML=`
  <div class="card">
    <div class="ch"><i class="ti ti-trending-up" aria-hidden="true"></i> 2025 demand forecast with confidence interval</div>
    <div class="lgd">
      <div class="li"><span class="lsq" style="background:#0078AE"></span>Forecast</div>
      <div class="li"><span class="lsq" style="background:rgba(0,151,147,0.25);border:1px dashed #009793"></span>95% CI</div>
    </div>
    <div style="position:relative;width:100%;height:220px"><canvas id="fcChart" role="img" aria-label="2025 monthly demand forecast for medical imaging with confidence bands"></canvas></div>
    <div style="font-size:10px;color:var(--grey);margin-top:8px"><i class="ti ti-info-circle" aria-hidden="true"></i> Seasonal decomposition on 24-month history · Population growth +2.1%/yr · Tourism uplift applied</div>
  </div>
  <div class="card">
    <div class="ch"><i class="ti ti-calculator" aria-hidden="true"></i> FTE demand projection</div>
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Role</th><th>Current FTE</th><th>Projected need (2025)</th><th>Gap</th><th>Action</th></tr></thead>
      <tbody>${(()=>{
        const radN=sum(sites,'fte_rad')||sites.reduce((a,s)=>a+(SITE_DATA[s]?.fte.rad||0),0);
        const techN=sum(sites,'fte_tech')||sites.reduce((a,s)=>a+(SITE_DATA[s]?.fte.tech||0),0);
        const admN=sites.reduce((a,s)=>a+(SITE_DATA[s]?.fte.admin||0),0);
        const g=0.08;
        return [['Radiologists',radN,Math.ceil(radN*(1+g))],[`Technologists`,techN,Math.ceil(techN*(1+g))],['Admin / Clerical',admN,Math.ceil(admN*(1+g*0.5))]].map(([r,c,p])=>{
          const gap=p-c;
          return `<tr><td>${r}</td><td>${c}</td><td>${p}</td><td><span class="pill ${gap>3?'p-r':gap>0?'p-y':'p-g'}">+${gap}</span></td><td>${gap>3?'Urgent recruit':gap>0?'Plan hire':'Maintain'}</td></tr>`;
        }).join('');
      })()}</tbody>
    </table></div>
  </div>`;

  charts.fc=new Chart(document.getElementById('fcChart').getContext('2d'),{
    type:'line',data:{labels,datasets:[
      {label:'Forecast',data:fVals,borderColor:'#0078AE',borderWidth:2,pointRadius:3,tension:0.35,fill:false},
      {label:'Upper CI',data:fVals.map((v,i)=>v+ci[i]),borderColor:'rgba(0,151,147,0.3)',borderWidth:0,pointRadius:0,tension:0.35,fill:'+1'},
      {label:'Lower CI',data:fVals.map((v,i)=>v-ci[i]),borderColor:'rgba(0,151,147,0.3)',backgroundColor:'rgba(0,151,147,0.1)',borderWidth:0,pointRadius:0,tension:0.35,fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45}},y:{ticks:{callback:v=>v.toLocaleString(),font:{size:11}}}}}

}

function renderChat(el){

    </div>
    <div class="ci-row">
      <input type="text" id="chatIn" placeholder="e.g. Which sites have the highest MRI pressure?" onkeydown="if(event.key==='Enter')doChat()"/>
      <button class="sbtn" onclick="doChat()">Send ↗</button>
    </div>
  </div>`;
}

async function doChat(){
  const inp=document.getElementById('chatIn');
  const q=inp.value.trim();if(!q)return;
  inp.value='';
  const m=document.getElementById('chatMsgs');
  m.innerHTML+=`<div class="msg user">${q}</div><div class="msg ai" id="aiT">Thinking...</div>`;
  m.scrollTop=m.scrollHeight;

  const sites=filteredSites(),p=getPeriod();
  const ctx=`VCH Medical Imaging Capacity Dashboard. Role: ${ROLE_LABELS[curRole]}. Filter: HA=${getHA()}, Sites=${sites.join(',')}, Modality=${getMod()}, Period=${p}, Metric=${curMetric}.
Sites data summary: ${sites.map(s=>{const d=SITE_DATA[s];if(!d)return '';return `${s}(HA:${SITES.VCH.includes(s)?'VCH':'PHC'} ${curMetric}:${d[curMetric]?.[p]} pop:${d.pop} visitors:${d.visitors} FTE rad:${d.fte.rad} tech:${d.fte.tech} waitlist MRI:${d.waitlist.MRI} CT:${d.waitlist.CT} critEq:${Object.values(d.equipment).filter(e=>e.status==='Critical').length})`;}).join(' | ')}`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:350,
        system:`You are a concise VCH medical imaging capacity planning analyst. Answer only from the provided data. Be specific with site names and numbers. Max 4 sentences. Role context: ${ROLE_LABELS[curRole]} — tailor your answer to what this stakeholder cares about.\n\nData: ${ctx}`,
        messages:[{role:'user',content:q}]})});
    const data=await r.json();
    document.getElementById('aiT').textContent=data.content?.[0]?.text||'Unable to respond.';
  }catch{document.getElementById('aiT').textContent='Connection error.';}
  m.scrollTop=m.scrollHeight;
}

function render(){
  renderMetrics();
  renderNav();
  renderTab();
}

filterUpdate();
